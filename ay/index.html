<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibna🫶🏼</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: black;
            background-image: url('https://i.pinimg.com/originals/be/80/f2/be80f29361acc483644d5a135d994345.gif'); /* Background love */
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; /* Warna teks putih untuk kontras */
            padding-top: 50px; /* Ruang atas agar konten tidak tumpang tindih dengan latar belakang */
        }

        @media only screen and (max-width: 600px) {
            body {
                background-color: black;
                background-image: url('https://i.pinimg.com/originals/be/80/f2/be80f29361acc483644d5a135d994345.gif'); /* Background love */
                background-size: contain;
                background-position: center;
            }
            .button-container {
                flex-direction: column;
            }
        }
        h1, p {
            margin: 10px 0;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .button-container button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ff6666; /* Warna merah untuk tombol */
            border: none;
            border-radius: 5px;
            color: white;
            outline: none;
        }
        .button-container button:hover {
            background-color: #ff4d4d; /* Warna merah yang lebih gelap saat hover */
        }
        @media only screen and (max-width: 600px) {
            .button-container {
                flex-direction: column;
            }
        }
    </style>
    <script>
        function checkLove(answer) {
            if (answer === 'iya' || answer === 'harus_iya') {
                alerta();
            }
            else {
                document.getElementById('noButton').style.display = "none";
                document.getElementById('iyaButton').innerText = "Harus Iya";
            }
        }
        function alerta(params) {
            alert("I lopyuuuuu ayanggg sayangkuu🤍🤍🫶🏼🫶🏼");
            window.close();
        }
    </script>
</head>
<body>
    <h1>Apakah Ayang Sayang Aku?</h1>
    <div class="button-container">
        <button id="iyaButton" onclick="checkLove('iya')">Ya</button>
        <button id="noButton" onclick="checkLove('tidak')">Tidak</button>
    </div>
</body>
</html>
